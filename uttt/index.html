<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Play Ultimate Tic-Tac-Toe against an AI opponent. A strategic twist on classic tic-tac-toe with 9 nested boards.">
  <title>Ultimate Tic-Tac-Toe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main id="app">
    <h1>Ultimate Tic-Tac-Toe</h1>
    <canvas id="board-canvas" width="700" height="700"></canvas>
    <div id="status">Your turn (X)</div>
    <button id="new-game-btn">New Game</button>
  </main>

  <!-- Difficulty Picker Overlay -->
  <div id="difficulty-picker" class="hidden">
    <div class="picker-card">
      <h2>Select Difficulty</h2>
      <div class="picker-buttons">
        <button data-difficulty="normal">Normal</button>
        <button data-difficulty="hard">Hard</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
